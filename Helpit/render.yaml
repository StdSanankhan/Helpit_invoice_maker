services:
  - type: web
    name: helpit-invoice-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    region: oregon # Common free region
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: helpit-postgres
          property: connectionString
      - key: API_BASE
        value: https://helpit-invoice-backend.onrender.com

databases:
  - name: helpit-postgres
    plan: free
    region: oregon
